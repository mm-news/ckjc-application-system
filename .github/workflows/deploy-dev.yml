name: Deploy
on:
  push:
    branches: 'dev-*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
                  
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
      - name: Setup clasp credentials
        run: |
          echo '${{ secrets.DEV_CLASPRC_JSON }}' > ~/.clasprc.json
          echo '${{ secrets.DEV_CLASP_JSON }}' > .clasp.json

      - name: Push and deploy to GAS
        run: |
          npx @google/clasp push --force
          npx @google/clasp deploy -i '${{ secrets.DEV_ID }}' -d '${{ github.event.head_commit.message }}'
name: Deploy (Dev)
on:
  push:
    branches: ['dev-*']

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
                  
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Setup clasp credentials
        run: |
          echo '${{ secrets.DEV_CLASPRC_JSON }}' > ~/.clasprc.json
          echo '${{ secrets.DEV_CLASP_JSON }}' > .clasp.json

      - name: Push and deploy to GAS
        run: |
          npx --no-install clasp push --force
          npx --no-install clasp deploy -i '${{ secrets.DEV_ID }}' -d '${{ github.event.head_commit.message }}'